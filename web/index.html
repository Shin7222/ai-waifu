<!doctype html>

<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Fern AI Assistant</title>

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
      }

      #canvas-container {
        width: 100vw;
        height: 100vh;
      }

      #status {
        position: fixed;
        top: 10px;
        left: 10px;
        background: rgba(0, 0, 0, 0.5);
        color: #0f0;
        padding: 6px 10px;
        border-radius: 6px;
        font-size: 12px;
        font-family: monospace;
        z-index: 9999;
      }

      #chatlog {
        position: fixed;
        right: 10px;
        bottom: 70px;
        width: 320px;
        height: 260px;
        overflow-y: auto;
        background: rgba(0, 0, 0, 0.55);
        color: white;
        padding: 10px;
        border-radius: 10px;
        font-family: sans-serif;
        z-index: 9999;
      }

      #chatbar {
        position: fixed;
        right: 10px;
        bottom: 10px;
        display: flex;
        gap: 5px;
        z-index: 9999;
      }

      #msg {
        width: 250px;
        padding: 8px;
      }

      button {
        padding: 8px 12px;
        cursor: pointer;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.10/dist/browser/pixi.min.js"></script>

    <script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0/dist/cubism4.min.js"></script>
  </head>

  <body>
    <div id="status">Connecting...</div>

    <div id="canvas-container"></div>

    <div id="chatlog"></div>

    <div id="chatbar">
      <input id="msg" placeholder="Tanya Fern..." />
      <button onclick="sendMessage()">Send</button>
    </div>

    <script>
      const statusEl = document.getElementById("status");

      function addMessage(sender, text) {
        const log = document.getElementById("chatlog");

        const div = document.createElement("div");

        div.innerHTML = `<b>${sender}:</b> ${text}`;

        log.appendChild(div);

        log.scrollTop = log.scrollHeight;
      }

      async function sendMessage() {
        const input = document.getElementById("msg");

        const msg = input.value.trim();

        if (!msg) return;

        addMessage("You", msg);

        input.value = "";

        try {
          const response = await fetch("/chat", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              message: msg,
            }),
          });

          const data = await response.json();

          addMessage("Fern", data.response);
        } catch (err) {
          console.error(err);

          addMessage("System", "Koneksi gagal");
        }
      }

      document.getElementById("msg").addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          sendMessage();
        }
      });

      // PIXI

      const app = new PIXI.Application({
        view: (() => {
          const c = document.createElement("canvas");

          document.getElementById("canvas-container").appendChild(c);

          return c;
        })(),
        resizeTo: window,
        backgroundAlpha: 0,
        antialias: true,
      });

      let model = null;

      let mouthParamId = "ParamMouthOpenY";

      // Mapping label emosi dari backend -> nama file expression Fern (tanpa ekstensi)
      const EXPRESSION_MAP = {
        happy: "sy",
        sad: "lh",
        angry: "lh",
        normal: "sq",
        neutral: "sq",
        error: "sq",
      };

      function applyExpression(emotionLabel) {
        if (!model || !model.internalModel) return;

        const exprName = EXPRESSION_MAP[emotionLabel] || "sq";

        try {
          // pixi-live2d-display: expression manager tersedia via internalModel
          if (
            model.internalModel.motionManager &&
            model.internalModel.motionManager.expressionManager
          ) {
            model.internalModel.motionManager.expressionManager.setExpression(
              exprName,
            );
          } else if (model.expression) {
            // fallback API beberapa versi
            model.expression(exprName);
          }
          statusEl.textContent = `Expression: ${exprName} (${emotionLabel})`;
        } catch (err) {
          console.error("Expression error:", err);
        }
      }

      let dragging = false;
      let dragOffsetX = 0;
      let dragOffsetY = 0;

      (async () => {
        try {
          model = await PIXI.live2d.Live2DModel.from(
            "/model/fern/fern.model3.json",
          );

          app.stage.addChild(model);

          // posisi awal
          model.anchor.set(0.5, 0.5);

          let currentScale = 0.25;

          model.scale.set(currentScale);

          model.x = app.screen.width / 2;
          model.y = app.screen.height / 2;

          // ====================
          // DRAG & DROP
          // ====================

          let dragging = false;

          model.interactive = true;
          model.buttonMode = true;

          model.cursor = "grab";

          model
            .on("pointerdown", (event) => {
              dragging = true;

              model.cursor = "grabbing";

              const pos = event.data.getLocalPosition(model.parent);

              model.dragOffsetX = pos.x - model.x;
              model.dragOffsetY = pos.y - model.y;
            })

            .on("pointerup", () => {
              dragging = false;

              model.cursor = "grab";
            })

            .on("pointerupoutside", () => {
              dragging = false;

              model.cursor = "grab";
            })

            .on("pointermove", (event) => {
              if (!dragging) return;

              const pos = event.data.getLocalPosition(model.parent);

              model.x = pos.x - model.dragOffsetX;
              model.y = pos.y - model.dragOffsetY;
            });

          // ====================
          // ZOOM WHEEL
          // ====================

          window.addEventListener(
            "wheel",
            (e) => {
              e.preventDefault();

              if (e.deltaY < 0) {
                currentScale *= 1.1;
              } else {
                currentScale *= 0.9;
              }

              currentScale = Math.max(0.05, Math.min(3, currentScale));

              model.scale.set(currentScale);
            },
            { passive: false },
          );

          // ====================
          // DOUBLE CLICK RESET
          // ====================

          window.addEventListener("dblclick", () => {
            currentScale = 0.25;

            model.scale.set(currentScale);

            model.x = app.screen.width / 2;

            model.y = app.screen.height / 2;
          });

          function layout() {
            if (!model) return;

            app.renderer.resize(window.innerWidth, window.innerHeight);
          }

          layout();

          window.addEventListener("resize", layout);

          model.interactive = true;
          model.buttonMode = true;

          model.on("pointerdown", (e) => {
            dragging = true;

            const pos = e.data.global;

            dragOffsetX = pos.x - model.x;

            dragOffsetY = pos.y - model.y;
          });

          app.stage.on("pointermove", (e) => {
            if (!dragging) return;

            const pos = e.data.global;

            model.x = pos.x - dragOffsetX;

            model.y = pos.y - dragOffsetY;
          });

          app.stage.on("pointerup", () => {
            dragging = false;
          });

          app.stage.on("pointerupoutside", () => {
            dragging = false;
          });

          statusEl.textContent = "Fern Loaded ✓";
        } catch (err) {
          console.error(err);

          statusEl.textContent = "Model Error";
        }
      })();

      let audioCtx = null;
      let analyser = null;
      let lipSyncRAF = null;

      function setupAudio() {
        if (audioCtx) return;

        audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        analyser = audioCtx.createAnalyser();

        analyser.fftSize = 256;
      }

      function playAudioWithLipSync(base64Wav) {
        setupAudio();

        const binary = atob(base64Wav);

        const bytes = new Uint8Array(binary.length);

        for (let i = 0; i < binary.length; i++) {
          bytes[i] = binary.charCodeAt(i);
        }

        audioCtx.decodeAudioData(
          bytes.buffer,

          (buffer) => {
            const source = audioCtx.createBufferSource();

            source.buffer = buffer;

            source.connect(analyser);

            analyser.connect(audioCtx.destination);

            source.start();

            const dataArray = new Uint8Array(analyser.frequencyBinCount);

            function tick() {
              analyser.getByteTimeDomainData(dataArray);

              let sum = 0;

              for (let i = 0; i < dataArray.length; i++) {
                const n = (dataArray[i] - 128) / 128;

                sum += n * n;
              }

              const rms = Math.sqrt(sum / dataArray.length);

              const mouth = Math.min(1, rms * 6);

              if (
                model &&
                model.internalModel &&
                model.internalModel.coreModel
              ) {
                model.internalModel.coreModel.setParameterValueById(
                  mouthParamId,
                  mouth,
                );
              }

              lipSyncRAF = requestAnimationFrame(tick);
            }

            tick();

            source.onended = () => {
              cancelAnimationFrame(lipSyncRAF);

              if (
                model &&
                model.internalModel &&
                model.internalModel.coreModel
              ) {
                model.internalModel.coreModel.setParameterValueById(
                  mouthParamId,
                  0,
                );
              }
            };
          },
        );
      }

      function connectWS() {
        const ws = new WebSocket(`ws://${location.host}/ws`);

        ws.onopen = () => {
          statusEl.textContent = "Connected ✓";
        };

        ws.onmessage = (ev) => {
          try {
            const msg = JSON.parse(ev.data);

            if (msg.type === "speak") {
              playAudioWithLipSync(msg.audio_b64);
            }

            if (msg.type === "expression") {
              applyExpression(msg.name);
            }
          } catch (err) {
            console.error(err);
          }
        };

        ws.onclose = () => {
          statusEl.textContent = "Disconnected";

          setTimeout(connectWS, 2000);
        };
      }

      connectWS();

      document.body.addEventListener(
        "click",
        () => {
          setupAudio();

          if (audioCtx && audioCtx.state === "suspended") {
            audioCtx.resume();
          }
        },
        { once: true },
      );
    </script>
  </body>
</html>
